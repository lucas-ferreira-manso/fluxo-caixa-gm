async function init() {
  const { data, error } = await sb.from("lancamentos").select("*").order("data");
  if (error && error.code === "42P01") { mostrarSetup(); return; }
  if (error) { document.getElementById("app").innerHTML = `<div class="loader">❌ Erro: ${error.message}</div>`; return; }
  if (data.length === 0) await importarIniciais();
  else dados = data;
  const cfg = await sb.from("configuracoes").select("valor").eq("chave","saldo_inicial").single();
  if (cfg.data) saldoInicial = parseFloat(cfg.data.valor);
  draw();

  sb.channel("lc").on("postgres_changes", { event:"*", schema:"public", table:"lancamentos" }, async () => {
    const r = await sb.from("lancamentos").select("*").order("data");
    if (!r.error) { dados = r.data; draw(); }
  }).subscribe();
}

async function importarIniciais() {
  const { data } = await sb.from("lancamentos").insert(DADOS_INICIAIS).select();
  if (data) dados = data;
}

async function salvarSaldo(v) {
  await sb.from("configuracoes").upsert({ chave:"saldo_inicial", valor:String(v) });
  saldoInicial = v;
}

async function addLanc(row) {
  syncing = true; draw();
  const { data } = await sb.from("lancamentos").insert([row]).select();
  if (data) dados = [...dados, ...data].sort((a,b) => a.data.localeCompare(b.data));
  syncing = false; draw();
}

async function updLanc(id, row) {
  syncing = true; draw();
  await sb.from("lancamentos").update(row).eq("id", id);
  dados = dados.map(l => l.id === id ? {...l,...row} : l);
  syncing = false; draw();
}

async function delLanc(id) {
  syncing = true; draw();
  await sb.from("lancamentos").delete().eq("id", id);
  dados = dados.filter(l => l.id !== id);
  confirmDel = null; syncing = false; draw();
}

// ── Cálculos ──────────────────────────────────────────────────────────────────
function analise() {
  let ac = saldoInicial;
  return MN.map((_,m) => {
    const p = `${ano}-${String(m+1).padStart(2,"0")}`;
    const its = dados.filter(l => l.data.startsWith(p));
    const e = its.filter(l => l.tipo==="E").reduce((a,l)=>a+Number(l.valor),0);
    const s = its.filter(l => l.tipo==="S").reduce((a,l)=>a+Number(l.valor),0);
    const so = e-s; const acum = ac+so; ac = acum;
    return { mes:m, e, s, so, acum };
  });
}

function lancMes() {
  const p = `${ano}-${String(mes+1).padStart(2,"0")}`;
  return dados.filter(l => l.data.startsWith(p)
    && (filtCat==="Todas" || l.categoria===filtCat)
    && (filtPago==="Todos" || (filtPago==="Pago"?l.pago:!l.pago))
    && (!busca || l.categoria.toLowerCase().includes(busca.toLowerCase()) || (l.descricao||"").toLowerCase().includes(busca.toLowerCase()))
  ).sort((a,b)=>a.data.localeCompare(b.data));
}

function porCat() {
  const p = `${ano}-${String(mes+1).padStart(2,"0")}`;
  const m = {};
  dados.filter(l=>l.data.startsWith(p)).forEach(l=>{
    if(!m[l.categoria]) m[l.categoria]={t:0,tp:l.tipo};
    m[l.categoria].t += Number(l.valor);
  });
  return Object.entries(m).sort((a,b)=>b[1].t-a[1].t);
}

      </div>
      <input placeholder="🔍 Buscar..." value="${busca}" style="max-width:150px;" oninput="busca=this.value;draw()" />
      <select style="max-width:195px;" onchange="filtCat=this.value;draw()">
        <option>Todas</option>
        <optgroup label="Entradas">${CE.map(c=>`<option${filtCat===c?" selected":""}>${c}</option>`).join("")}</optgroup>
        <optgroup label="Saídas">${CS.map(c=>`<option${filtCat===c?" selected":""}>${c}</option>`).join("")}</optgroup>
      </select>
      <select style="max-width:110px;" onchange="filtPago=this.value;draw()">
        <option>Todos</option><option${filtPago==="Pago"?" selected":""}>Pago</option><option${filtPago==="Pendente"?" selected":""}>Pendente</option>
      </select>
    </div>
    <div class="grid3" style="margin-bottom:12px;">
      ${[["Saldo Anterior",sa,""],["Entradas",mi.e,"#1a7a3a"],["Saídas",mi.s,"#c0392b"]].map(([l,v,c])=>`
        <div class="card" style="text-align:center;padding:10px;margin:0;">
          <div style="font-size:10px;color:#888;">${l}</div>
          <div style="font-size:14px;font-weight:bold;color:${c||(v>=0?"#1a7a3a":"#c0392b")}">${R(v)}</div>
        </div>`).join("")}
    </div>`;
    if (!LM.length) {
      h += `<div style="text-align:center;color:#888;padding:40px;">Sem lançamentos. <button onclick="aba='novo';draw()" style="color:#2d5a3d;background:none;border:none;cursor:pointer;text-decoration:underline">Adicionar</button></div>`;
    } else {
      h += `<div style="overflow-x:auto"><table><thead><tr><th>Data</th><th>Categoria</th><th>Valor</th><th>Pago</th><th>Descrição</th><th></th></tr></thead><tbody>`;
      LM.forEach(l => {
        h += `<tr>
          <td style="white-space:nowrap">${l.data.slice(5).replace("-","/")}</td>
          <td><span class="${l.tipo==="E"?"be":"bs"}">${l.categoria}</span></td>
          <td class="${l.tipo==="E"?"pos":"neg"}">${l.tipo==="E"?"+":"-"}${R(Number(l.valor))}</td>
          <td><button style="background:none;border:none;cursor:pointer;font-size:15px;" onclick="updLanc('${l.id}',{pago:${!l.pago}})">${l.pago?"✅":"⬜"}</button></td>
          <td style="color:#666;max-width:130px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${l.descricao||"—"}</td>
          <td style="white-space:nowrap">
            <button class="bg" style="margin-right:3px" onclick="abrirEdit('${l.id}')">✏️</button>
            ${confirmDel===l.id
              ? `<button class="bg" style="color:#c0392b" onclick="delLanc('${l.id}')">✓ Sim</button> <button class="bg" onclick="confirmDel=null;draw()">✕</button>`
              : `<button class="bg" style="color:#c0392b" onclick="confirmDel='${l.id}';draw()">🗑</button>`}
          </td>
        </tr>`;
      });
      h += `</tbody></table></div>`;
    }
  }

  // ANÁLISE
  else if (aba==="anal") {
    h += `<div style="display:flex;align-items:center;gap:7px;margin-bottom:13px;">
      <button class="bn" onclick="mes=(mes+11)%12;draw()">◀</button>
      <span style="font-weight:bold;font-size:13px;min-width:120px;text-align:center;">${MF[mes]} ${ano}</span>
      <button class="bn" onclick="mes=(mes+1)%12;draw()">▶</button>
    </div>
    <div class="grid2" style="margin-bottom:13px;">
      ${[["Saldo Inicial",sa],["Entradas",mi.e],["Saídas",mi.s],["Saldo Acumulado",mi.acum]].map(([l,v])=>`
        <div class="card" style="text-align:center;margin:0;">
          <div style="font-size:11px;color:#888">${l}</div>
          <div style="font-size:18px;font-weight:bold;color:${v>=0?"#1a7a3a":"#c0392b"}">${R(v)}</div>
        </div>`).join("")}
    </div>
    <div class="card">
      <div style="font-weight:bold;color:#2d5a3d;margin-bottom:10px;font-size:13px">Por categoria — ${MF[mes]}</div>
      ${!PC.length ? `<div style="color:#888;font-size:13px">Sem lançamentos.</div>` : PC.map(([cat,{t,tp}])=>{
        const mx = Math.max(...PC.map(([,{t}])=>t));
        return `<div style="margin-bottom:9px">
          <div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:2px">
            <span style="color:${tp==="E"?"#1a7a3a":"#c0392b"}">${cat}</span>
            <span style="font-weight:bold">${R(t)}</span>
          </div>
          <div class="bar-wrap"><div class="bar-fill" style="width:${((t/mx)*100).toFixed(1)}%;background:${tp==="E"?"#27ae60":"#e74c3c"}"></div></div>
        </div>`;
      }).join("")}
    </div>
    <div class="card" style="overflow-x:auto;margin-top:12px">
      <div style="font-weight:bold;color:#2d5a3d;margin-bottom:9px;font-size:13px">Visão anual ${ano}</div>
      <table><thead><tr><th>Mês</th><th style="text-align:right">Entradas</th><th style="text-align:right">Saídas</th><th style="text-align:right">Saldo</th><th style="text-align:right">Acumulado</th></tr></thead><tbody>
      ${A.map(({mes:m,e,s,so,acum})=>`
        <tr style="cursor:pointer${m===mes?";font-weight:bold":""}" onclick="mes=${m};draw()">
          <td>${MN[m]}</td>
          <td style="text-align:right;color:#1a7a3a">${R(e)}</td>
          <td style="text-align:right;color:#c0392b">${R(s)}</td>
          <td style="text-align:right;color:${so>=0?"#1a7a3a":"#c0392b"};font-weight:bold">${R(so)}</td>
          <td style="text-align:right;color:${acum>=0?"#1a7a3a":"#c0392b"};font-weight:bold">${R(acum)}</td>
        </tr>`).join("")}
      </tbody></table>
    </div>`;
  }

  // NOVO / EDITAR
  else if (aba==="novo") {
    h += `<div class="card" style="max-width:450px">
      <div style="font-weight:bold;font-size:15px;color:#2d5a3d;margin-bottom:14px">${editId?"✏️ Editar":"➕ Novo Lançamento"}</div>
      <label class="lbl">Data<input type="date" id="f_data" value="${fm.data}" /></label>
      <label class="lbl">Categoria
        <select id="f_cat">
          <option value="">Selecione...</option>
          <optgroup label="✅ Entradas">${CE.map(c=>`<option${fm.cat===c?" selected":""}>${c}</option>`).join("")}</optgroup>
          <optgroup label="❌ Saídas">${CS.map(c=>`<option${fm.cat===c?" selected":""}>${c}</option>`).join("")}</optgroup>
        </select>
      </label>
      <label class="lbl">Valor (R$)<input type="number" id="f_val" step="0.01" min="0" placeholder="0,00" value="${fm.val}" /></label>
      <label class="lbl">Descrição (opcional)<input type="text" id="f_desc" placeholder="Ex: hapvida, condomínio..." value="${fm.desc}" /></label>
      <label style="display:flex;align-items:center;gap:8px;font-size:13px;color:#555;margin-bottom:12px;cursor:pointer">
        <input type="checkbox" id="f_pago" ${fm.pago?"checked":""} style="width:16px;height:16px" /> Já foi pago/recebido
      </label>
      <button class="bverde" onclick="submitForm()">${editId?"Salvar alterações":"Adicionar lançamento"}</button>
      ${editId?`<button class="bg" style="width:100%;margin-top:8px;padding:9px" onclick="editId=null;fm={data:'${hoje()}',cat:'',val:'',desc:'',pago:true};aba='lanc';draw()">Cancelar</button>`:""}
    </div>`;
  }

  h += `</div>`;
  document.getElementById("app").innerHTML = h;
}

function mostrarSetup() {
  document.getElementById("app").innerHTML = `
  <div style="max-width:680px;margin:40px auto;padding:0 16px;font-family:Georgia,serif">
    <div style="background:#1a3a2a;color:#e8dcc8;padding:22px;border-radius:10px 10px 0 0">
      <div style="font-size:20px;font-weight:bold">⚙️ Configuração Inicial</div>
      <div style="font-size:13px;opacity:.75;margin-top:4px">Execute o SQL abaixo no Supabase para criar as tabelas</div>
    </div>
    <div style="background:#fff;border:1px solid #ddd;border-radius:0 0 10px 10px;padding:22px" class="setup">
      <p style="margin-bottom:14px;font-size:14px">Acesse <strong>Supabase → SQL Editor</strong> e execute:</p>
      <pre>create table lancamentos (
  id uuid primary key default gen_random_uuid(),
  data date not null,
  categoria text not null,
  tipo text not null check (tipo in ('E','S')),
  valor numeric(12,2) not null,
  pago boolean default true,
  descricao text,
  created_at timestamptz default now()
);

create table configuracoes (
  chave text primary key,
  valor text not null
);

insert into configuracoes (chave, valor)
values ('saldo_inicial', '-3019.91');

alter table lancamentos disable row level security;
alter table configuracoes disable row level security;</pre>
      <button class="bn" style="margin-top:18px;padding:10px 24px" onclick="init()">✓ Já executei — carregar app</button>
    </div>
  </div>`;
}

// ── Ações globais ─────────────────────────────────────────────────────────────
async function salvarSaldoUI() {
  const v = parseFloat(document.getElementById("si").value);
  if (!isNaN(v)) { await salvarSaldo(v); editSaldo = false; draw(); }
}

function abrirEdit(id) {
  const l = dados.find(x => x.id === id);
  if (!l) return;
  fm = { data: l.data, cat: l.categoria, val: String(l.valor), desc: l.descricao||"", pago: l.pago };
  editId = id; aba = "novo"; draw();
}

async function submitForm() {
  const cat = document.getElementById("f_cat").value;
  const val = document.getElementById("f_val").value;
  if (!cat || !val) { alert("Preencha categoria e valor."); return; }
  fm = {
    data: document.getElementById("f_data").value,
    cat, val,
    desc: document.getElementById("f_desc").value,
    pago: document.getElementById("f_pago").checked
  };
  const tipo = CE.includes(cat) ? "E" : "S";
  const row = { data: fm.data, categoria: cat, tipo, valor: parseFloat(val), pago: fm.pago, descricao: fm.desc };
  if (editId) { await updLanc(editId, row); editId = null; }
  else { await addLanc(row); }
  fm = { data: hoje(), cat:"", val:"", desc:"", pago:true };
  aba = "lanc"; draw();
}

init();
</script>
</body>
</html>
